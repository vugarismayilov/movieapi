spring:
  application:
    name: movieapi

  datasource:
    url: jdbc:postgresql://localhost:5432/movie_db
    username: postgres
    password: 

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
